<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flight destination cards</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#eff0f1;
    --ink:#111214;
    --btn-dark:#141517;
    --muted:#9b9ca1;
    --meta:#3d3e42;
    --heart-red:#ec5b6a;
    --card-radius:40px;
    --card-w:372px;
  }

  *{box-sizing:border-box;margin:0;padding:0}

  html,body{height:100%}

  body{
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    background:var(--bg);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    padding:56px 32px;
  }

  .stage{
    display:flex;
    gap:64px;
    align-items:stretch;
    flex-wrap:wrap;
    justify-content:center;
  }

  /* ---------- shared card ---------- */
  .card{
    width:var(--card-w);
    border-radius:var(--card-radius);
    background:#fff;
    box-shadow:0 30px 60px -30px rgba(20,22,30,.28), 0 10px 24px -18px rgba(20,22,30,.35);
  }

  h2{
    font-size:41px;
    font-weight:800;
    letter-spacing:-0.028em;
    line-height:1.02;
  }
  .subtitle{
    font-size:20px;
    font-weight:400;
    color:var(--muted);
    margin-top:10px;
    letter-spacing:-0.01em;
  }

  .meta{
    display:flex;
    align-items:center;
    gap:26px;
    font-size:19px;
    font-weight:400;
    letter-spacing:-0.01em;
  }
  .meta .item{display:flex;align-items:center;gap:9px;white-space:nowrap}
  .meta .price b,.meta .code{font-weight:700}
  .meta svg{width:22px;height:22px;flex:none}

  .btn{
    border:0;
    cursor:pointer;
    font-family:inherit;
    font-size:17px;
    font-weight:600;
    letter-spacing:-0.01em;
    border-radius:999px;
    height:60px;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:transform .15s ease, box-shadow .2s ease, background .2s ease;
  }
  .btn:active{transform:scale(.985)}

  /* ---------- CARD 1 : full-bleed image ---------- */
  .card--image{
    position:relative;
    aspect-ratio:372/640;
    overflow:hidden;
    color:#fff;
    display:flex;
    flex-direction:column;
    justify-content:flex-end;
  }
  .card--image .photo{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:center 40%;
  }
  .card--image .scrim{
    position:absolute;
    inset:0;
    background:linear-gradient(to bottom,
      rgba(0,0,0,0) 42%,
      rgba(0,0,0,.35) 66%,
      rgba(0,0,0,.82) 100%);
  }
  .card--image .content{
    position:relative;
    padding:0 26px 24px;
    display:flex;
    flex-direction:column;
  }
  .card--image .subtitle{color:rgba(255,255,255,.82)}
  .card--image .meta{color:#fff;margin-top:22px}
  .card--image .meta svg{stroke:#fff}

  .card--image .btn-light{
    margin-top:22px;
    background:#fff;
    color:var(--ink);
    box-shadow:0 12px 30px -12px rgba(0,0,0,.5);
  }
  .card--image .btn-light:hover{background:#f4f4f5}

  /* frosted heart in corner */
  .fab{
    position:absolute;
    top:22px;
    right:22px;
    width:46px;
    height:46px;
    border-radius:50%;
    border:0;
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    background:rgba(255,255,255,.22);
    -webkit-backdrop-filter:blur(10px);
    backdrop-filter:blur(10px);
    box-shadow:0 8px 26px rgba(255,255,255,.28);
    transition:transform .15s ease, background .2s ease;
  }
  .fab:hover{background:rgba(255,255,255,.34)}
  .fab:active{transform:scale(.9)}
  .fab svg{width:22px;height:22px;stroke:#fff;fill:none;transition:fill .2s ease}
  .fab.on svg{fill:var(--heart-red);stroke:var(--heart-red)}

  /* ---------- CARD 2 : white ---------- */
  .card--white{
    padding:14px 14px 22px;
    display:flex;
    flex-direction:column;
  }
  .card--white .media{
    border-radius:28px;
    overflow:hidden;
    aspect-ratio:344/300;
  }
  .card--white .media img{
    width:100%;height:100%;object-fit:cover;display:block;
    object-position:center 35%;
  }
  .card--white .body{padding:22px 12px 0}
  .card--white h2{color:var(--ink)}
  .card--white .meta{color:var(--meta);margin-top:26px}
  .card--white .meta svg{stroke:#8a8b90}

  .actions{
    display:flex;
    align-items:center;
    gap:16px;
    margin-top:26px;
  }
  .btn-dark{
    flex:1;
    background:var(--btn-dark);
    color:#fff;
  }
  .btn-dark:hover{background:#000}

  .heart-circle{
    width:60px;height:60px;flex:none;
    border-radius:50%;
    background:#fff;
    border:1.5px solid #ececee;
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:transform .15s ease, border-color .2s ease;
  }
  .heart-circle:hover{border-color:#dcdce0}
  .heart-circle:active{transform:scale(.92)}
  .heart-circle svg{width:26px;height:26px;stroke:var(--heart-red);fill:none;transition:fill .2s ease}
  .heart-circle.on svg{fill:var(--heart-red)}

  :focus-visible{outline:2px solid #4a90ff;outline-offset:3px}

  @media (max-width:840px){
    body{padding:40px 20px}
    .stage{gap:40px}
  }
  @media (prefers-reduced-motion:reduce){
    *{transition:none!important}
  }
</style>
</head>
<body>
  <div class="stage">

    <!-- ===== Card 1: New York ===== -->
    <article class="card card--image">
      <img class="photo" alt="Skyscrapers lining a New York City avenue"
           src="https://images.unsplash.com/photo-1496442226666-8d4d0e62e6e9?w=900&q=80&auto=format&fit=crop">
      <div class="scrim"></div>

      <button class="fab" aria-label="Save New York" aria-pressed="false">
        <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>
        </svg>
      </button>

      <div class="content">
        <h2>New York</h2>
        <p class="subtitle">Economy</p>

        <div class="meta">
          <span class="item price">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12.586 2.586A2 2 0 0 0 11.172 2H4a2 2 0 0 0-2 2v7.172a2 2 0 0 0 .586 1.414l8.704 8.704a2.426 2.426 0 0 0 3.42 0l6.58-6.58a2.426 2.426 0 0 0 0-3.42z"/>
              <circle cx="7.5" cy="7.5" r="1.2" fill="currentColor" stroke="none"/>
            </svg>
            from <b>&nbsp;$120</b>
          </span>
          <span class="item">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 4.3 3.5c.4.3.9.4 1.3.2l.5-.3c.4-.3.6-.7.5-1.2Z"/>
            </svg>
            <span class="code">JFK</span>
          </span>
        </div>

        <button class="btn btn-light">Search flight</button>
      </div>
    </article>

    <!-- ===== Card 2: San Francisco ===== -->
    <article class="card card--white">
      <div class="media">
        <img alt="Golden Gate Bridge over the bay at sunset"
             src="https://images.unsplash.com/photo-1501594907352-04cda38ebc29?w=900&q=80&auto=format&fit=crop">
      </div>

      <div class="body">
        <h2>San Francisco</h2>
        <p class="subtitle">Premium economy</p>

        <div class="meta">
          <span class="item price">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12.586 2.586A2 2 0 0 0 11.172 2H4a2 2 0 0 0-2 2v7.172a2 2 0 0 0 .586 1.414l8.704 8.704a2.426 2.426 0 0 0 3.42 0l6.58-6.58a2.426 2.426 0 0 0 0-3.42z"/>
              <circle cx="7.5" cy="7.5" r="1.2" fill="currentColor" stroke="none"/>
            </svg>
            from <b>&nbsp;$240</b>
          </span>
          <span class="item">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 4.3 3.5c.4.3.9.4 1.3.2l.5-.3c.4-.3.6-.7.5-1.2Z"/>
            </svg>
            <span class="code">SFO</span>
          </span>
        </div>

        <div class="actions">
          <button class="btn btn-dark">Search flight</button>
          <button class="heart-circle on" aria-label="Save San Francisco" aria-pressed="true">
            <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>
            </svg>
          </button>
        </div>
      </div>
    </article>

  </div>

  <script>
    document.querySelectorAll('.fab, .heart-circle').forEach(function(el){
      el.addEventListener('click', function(){
        var on = el.classList.toggle('on');
        el.setAttribute('aria-pressed', on ? 'true' : 'false');
      });
    });
  </script>
</body>
</html>
